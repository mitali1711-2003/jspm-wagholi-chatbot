services:
  - type: web
    name: jspm-wagholi-chatbot
    runtime: python
    buildCommand: pip install -r requirements.txt && python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')"
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11"
      - key: HF_HUB_OFFLINE
        value: "1"
      - key: TRANSFORMERS_OFFLINE
        value: "1"
