<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversations & Reviews — Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .tab-bar {
            display: flex;
            gap: 4px;
            background: var(--bg-light);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 24px;
            width: fit-content;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            max-width: 100%;
        }
        .tab-btn {
            padding: 10px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: var(--text-muted);
            transition: all 0.3s ease;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 8px rgba(108, 99, 255, 0.3);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .filter-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
        }
        .filter-bar select {
            padding: 8px 14px;
            border: 2px solid var(--border-light);
            border-radius: 8px;
            font-size: 13px;
            background: var(--card-light);
            color: var(--text-light);
        }
        .chat-preview {
            background: var(--card-light);
            border-radius: var(--radius);
            padding: 18px 20px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border-left: 4px solid var(--primary);
            transition: all 0.2s ease;
        }
        .chat-preview:hover {
            box-shadow: var(--shadow);
            transform: translateX(4px);
        }
        .chat-preview.mindmate {
            border-left-color: #FF6B9D;
        }
        .chat-preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .chat-preview-user {
            font-weight: 700;
            font-size: 14px;
        }
        .chat-preview-meta {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .chat-preview-q {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 6px;
            font-weight: 500;
        }
        .chat-preview-a {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.5;
            max-height: 60px;
            overflow: hidden;
        }
        .review-card {
            background: var(--card-light);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .review-stars {
            color: #F6E05E;
            font-size: 18px;
            letter-spacing: 2px;
        }
        .review-text {
            font-size: 14px;
            color: var(--text-light);
            margin-top: 8px;
            font-style: italic;
            line-height: 1.6;
        }
        .review-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
        }
        .rating-big {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #F6E05E, #ED8936);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .pagination {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 20px;
        }
        .pagination button {
            padding: 8px 16px;
            border: 2px solid var(--border-light);
            border-radius: 8px;
            background: var(--card-light);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .pagination button:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('dashboard') }}" class="navbar-brand">CampusBot Admin</a>
        <div class="navbar-links">
            <a href="{{ url_for('dashboard') }}">Dashboard</a>
            <a href="{{ url_for('admin_panel') }}">FAQs</a>
            <a href="{{ url_for('admin_analytics') }}">Analytics</a>
            <a href="{{ url_for('admin_conversations') }}" style="color: var(--primary);">Conversations</a>
            <a href="{{ url_for('admin_security') }}">Security</a>
            <button class="theme-toggle" onclick="toggleTheme()">&#9790;</button>
            <a href="{{ url_for('logout') }}">Logout</a>
        </div>
    </nav>

    <div class="admin-main">
        <div class="admin-header">
            <h2>Conversations & Reviews</h2>
        </div>

        <!-- Tabs -->
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('questions')">Questions Asked</button>
            <button class="tab-btn" onclick="switchTab('top')">Most Asked</button>
            <button class="tab-btn" onclick="switchTab('users')">Per User</button>
            <button class="tab-btn" onclick="switchTab('reviews')">Reviews</button>
        </div>

        <!-- TAB 1: All Questions Asked -->
        <div class="tab-content active" id="tab-questions">
            <div class="filter-bar">
                <select id="botFilter" onchange="loadConversations(1)">
                    <option value="all">All Bots</option>
                    <option value="campus">Campus Bot Only</option>
                    <option value="mindmate">MindMate AI Only</option>
                </select>
                <span id="totalCount" style="font-size:13px; color:var(--text-muted);"></span>
            </div>
            <div id="conversationsList">Loading...</div>
            <div class="pagination">
                <button id="prevBtn" onclick="changePage(-1)" disabled>&#8592; Previous</button>
                <span id="pageInfo" style="padding:8px 16px; font-size:14px; color:var(--text-muted);"></span>
                <button id="nextBtn" onclick="changePage(1)">Next &#8594;</button>
            </div>
        </div>

        <!-- TAB 2: Most Asked Questions -->
        <div class="tab-content" id="tab-top">
            <div class="faq-table">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Question</th>
                            <th>Bot</th>
                            <th>Times Asked</th>
                            <th>Asked By</th>
                        </tr>
                    </thead>
                    <tbody id="topQuestionsBody">
                        <tr><td colspan="5" class="text-center">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- TAB 3: Per User Activity -->
        <div class="tab-content" id="tab-users">
            <div class="faq-table">
                <table>
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Total Questions</th>
                            <th>Campus Bot</th>
                            <th>MindMate AI</th>
                        </tr>
                    </thead>
                    <tbody id="userActivityBody">
                        <tr><td colspan="4" class="text-center">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- TAB 4: Reviews -->
        <div class="tab-content" id="tab-reviews">
            <!-- Rating Summary -->
            <div class="stats-grid" style="margin-bottom: 24px;">
                <div class="stat-card" style="text-align:center;">
                    <h4>Campus Bot Rating</h4>
                    <div class="rating-big" id="campusRating">-</div>
                    <p style="font-size:12px; color:var(--text-muted);" id="campusRatingCount">0 reviews</p>
                </div>
                <div class="stat-card" style="text-align:center;">
                    <h4>MindMate AI Rating</h4>
                    <div class="rating-big" id="mindmateRating">-</div>
                    <p style="font-size:12px; color:var(--text-muted);" id="mindmateRatingCount">0 reviews</p>
                </div>
            </div>
            <div id="reviewsList">Loading...</div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script>
        let currentPage = 1;
        let totalPages = 1;

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
        }

        async function loadConversations(page) {
            currentPage = page;
            const bot = document.getElementById('botFilter').value;
            try {
                const res = await fetch(`/api/admin/conversations?bot=${bot}&page=${page}`);
                const data = await res.json();

                totalPages = Math.ceil(data.total / data.per_page) || 1;
                document.getElementById('totalCount').textContent = `${data.total} total conversations`;
                document.getElementById('pageInfo').textContent = `Page ${page} of ${totalPages}`;
                document.getElementById('prevBtn').disabled = page <= 1;
                document.getElementById('nextBtn').disabled = page >= totalPages;

                // Conversations list
                const list = document.getElementById('conversationsList');
                if (data.conversations.length === 0) {
                    list.innerHTML = '<p class="text-center" style="padding:40px; color:var(--text-muted);">No conversations yet</p>';
                } else {
                    list.innerHTML = data.conversations.map(c => {
                        const time = new Date(c.created_at).toLocaleString();
                        const isMindmate = c.bot_type === 'mindmate';
                        const botLabel = isMindmate ? 'MindMate AI' : 'CampusConnect AI';
                        const langMap = {en:'English', hi:'Hindi', mr:'Marathi'};
                        const ansPreview = c.bot_response.length > 150 ? c.bot_response.substring(0,150) + '...' : c.bot_response;
                        return `
                            <div class="chat-preview${isMindmate ? ' mindmate' : ''}">
                                <div class="chat-preview-header">
                                    <span class="chat-preview-user">${c.username}</span>
                                    <div class="chat-preview-meta">
                                        <span class="badge ${isMindmate ? 'badge-warning' : 'badge-primary'}">${botLabel}</span>
                                        <span>${langMap[c.language] || c.language}</span>
                                        <span>${time}</span>
                                    </div>
                                </div>
                                <div class="chat-preview-q">Q: ${escapeHtml(c.user_message)}</div>
                                <div class="chat-preview-a">A: ${escapeHtml(ansPreview)}</div>
                            </div>`;
                    }).join('');
                }

                // Top questions
                const topBody = document.getElementById('topQuestionsBody');
                if (data.top_questions.length === 0) {
                    topBody.innerHTML = '<tr><td colspan="5" class="text-center">No data</td></tr>';
                } else {
                    topBody.innerHTML = data.top_questions.map((q, i) => `
                        <tr>
                            <td>${i + 1}</td>
                            <td>${escapeHtml(q.user_message)}</td>
                            <td><span class="badge ${q.bot_type === 'mindmate' ? 'badge-warning' : 'badge-primary'}">${q.bot_type}</span></td>
                            <td><strong>${q.count}</strong></td>
                            <td style="font-size:12px; color:var(--text-muted);">${q.users}</td>
                        </tr>
                    `).join('');
                }

                // User activity
                const userBody = document.getElementById('userActivityBody');
                if (data.user_activity.length === 0) {
                    userBody.innerHTML = '<tr><td colspan="4" class="text-center">No data</td></tr>';
                } else {
                    userBody.innerHTML = data.user_activity.map(u => `
                        <tr>
                            <td><strong>${u.username}</strong></td>
                            <td>${u.total_questions}</td>
                            <td>${u.campus_q}</td>
                            <td>${u.mindmate_q}</td>
                        </tr>
                    `).join('');
                }

                // Reviews
                document.getElementById('campusRating').textContent = data.avg_ratings.campus || '-';
                document.getElementById('campusRatingCount').textContent = `${data.avg_ratings.campus_count} reviews`;
                document.getElementById('mindmateRating').textContent = data.avg_ratings.mindmate || '-';
                document.getElementById('mindmateRatingCount').textContent = `${data.avg_ratings.mindmate_count} reviews`;

                const reviewsDiv = document.getElementById('reviewsList');
                if (data.reviews.length === 0) {
                    reviewsDiv.innerHTML = '<p class="text-center" style="padding:40px; color:var(--text-muted);">No reviews yet. Reviews are collected when users end their chat session.</p>';
                } else {
                    reviewsDiv.innerHTML = data.reviews.map(r => {
                        const stars = '&#11088;'.repeat(r.rating) + '&#9734;'.repeat(5 - r.rating);
                        const time = new Date(r.created_at).toLocaleString();
                        const botLabel = r.bot_type === 'mindmate' ? 'MindMate AI' : 'Campus Bot';
                        return `
                            <div class="review-card">
                                <div style="display:flex; justify-content:space-between; align-items:center;">
                                    <div class="review-stars">${stars}</div>
                                    <span class="badge ${r.bot_type === 'mindmate' ? 'badge-warning' : 'badge-primary'}">${botLabel}</span>
                                </div>
                                ${r.feedback ? `<div class="review-text">"${escapeHtml(r.feedback)}"</div>` : ''}
                                <div class="review-meta">By <strong>${r.username}</strong> &middot; ${time}</div>
                            </div>`;
                    }).join('');
                }

            } catch (err) {
                console.error('Failed to load conversations:', err);
            }
        }

        function changePage(delta) {
            const newPage = currentPage + delta;
            if (newPage >= 1 && newPage <= totalPages) {
                loadConversations(newPage);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        loadConversations(1);
    </script>
</body>
</html>
